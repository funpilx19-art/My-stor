<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Apps</title>
    <style>
        /* আপনার UI একদম সেম রাখা হয়েছে */
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; margin: 0; padding: 15px; }
        header { text-align: center; padding: 20px; background: #161b22; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        .app-card { background: #161b22; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #30363d; }
        .app-card img { width: 60px; height: 60px; border-radius: 12px; margin-right: 15px; object-fit: cover; border: 1px solid #444; }
        .app-info { flex-grow: 1; }
        .app-name { font-size: 16px; font-weight: bold; }
        .download-btn { background: #238636; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* পপ-আপ এবং প্রগ্রেস বার (যা আপনার মেইন UI নষ্ট করবে না) */
        #download-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #30363d; width: 80%; max-width: 350px; }
        .progress-container { width: 100%; background: #30363d; border-radius: 10px; margin: 15px 0; height: 8px; overflow: hidden; display:none; }
        .progress-bar { width: 0%; height: 100%; background: #238636; transition: width 0.1s; }
        #unlock-btn { display: none; background: #1f6feb; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🔥 Top Premium Apps</h1>
</header>

<div id="app-container"></div>

<div id="download-modal">
    <div class="modal-content">
        <h3 id="modal-app-name" style="margin:0 0 10px 0;">Processing...</h3>
        <p id="timer-text" style="color:#8b949e; font-size:14px;">Please wait...</p>
        <div class="progress-container" id="prog-cont">
            <div class="progress-bar" id="prog-bar"></div>
        </div>
        <button id="unlock-btn" onclick="goToLink()">🚀 Download Now</button>
        <button style="margin-top:15px; background:none; border:none; color:#f85149; cursor:pointer;" onclick="closeModal()">[ Cancel ]</button>
    </div>
</div>

<script>
    // প্রতিটি অ্যাপের জন্য আলাদা 'link' দেওয়ার সিস্টেম
    const apps = [
        { name: "CapCut Pro", desc: "No Watermark", img: "capcut.jpg", link: "আপনার_লিঙ্ক_১" },
        { name: "KineMaster", desc: "Pro Unlocked", img: "kinemaster.png", link: "আপনার_লিঙ্ক_২" },
        { name: "Minecraft", desc: "Full Version", img: "minecraft.png", link: "আপনার_লিঙ্ক_৩" },
        { name: "Spotify Premium", desc: "No Ads", img: "spotify.png", link: "আপনার_লিঙ্ক_৪" },
        { name: "PicsArt Gold", desc: "VIP Assets", img: "picsart.png", link: "#" },
        { name: "Lightroom Pro", desc: "All Presets", img: "lightroom.png", link: "#" },
        { name: "Canva Pro", desc: "Pro Templates", img: "canva.png", link: "#" },
        { name: "Alight Motion", desc: "No Lag Mod", img: "alight.png", link: "#" },
        { name: "GTA V", desc: "Mobile Edition", img: "gta.jpg", link: "#" },
        { name: "InShot Pro", desc: "Full Effects", img: "inshot.png", link: "#" },
        { name: "Truecaller Gold", desc: "Gold Badge", img: "truecaller.jpg", link: "#" },
        { name: "Duolingo Plus", desc: "Premium Courses", img: "duolingo.png", link: "#" },
        { name: "Remini Pro", desc: "Unlimited AI", img: "remini.png", link: "#" },
        { name: "YouTube Premium", desc: "Background Play", img: "youtube.png", link: "#" },
        { name: "Netflix Mod", desc: "Free Movies", img: "netflix.png", link: "#" }
    ];

    const container = document.getElementById('app-container');
    let targetLink = "";

    apps.forEach(app => {
        container.innerHTML += `
            <div class="app-card">
                <img src="${app.img}" alt="${app.name}" onerror="this.src='https://via.placeholder.com/60?text=App'">
                <div class="app-info">
                    <div class="app-name">${app.name}</div>
                    <div style="font-size:11px; color:#8b949e">${app.desc}</div>
                </div>
                <button class="download-btn" onclick="initiateDownload('${app.link}', '${app.name}')">Download</button>
            </div>`;
    });

    function initiateDownload(link, name) {
        targetLink = link;
        document.getElementById('modal-app-name').innerText = name;
        document.getElementById('download-modal').style.display = 'flex';
        document.getElementById('prog-cont').style.display = 'block';
        document.getElementById('unlock-btn').style.display = 'none';
        document.getElementById('timer-text').style.display = 'block';
        
        let timeLeft = 5;
        let progress = 0;
        document.getElementById('prog-bar').style.width = "0%";

        let timer = setInterval(() => {
            timeLeft--;
            progress += 20;
            document.getElementById('timer-text').innerText = "Generating link in " + timeLeft + "s...";
            document.getElementById('prog-bar').style.width = progress + "%";

            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('timer-text').style.display = 'none';
                document.getElementById('prog-cont').style.display = 'none';
                document.getElementById('unlock-btn').style.display = 'block';
            }
        }, 1000);
    }

    function goToLink() {
        if(targetLink === "#" || targetLink === "") {
            alert("এই অ্যাপের ডাউনলোড লিঙ্ক এখনো সেট করা হয়নি!");
        } else {
            window.open(targetLink, '_blank');
            closeModal();
        }
    }

    function closeModal() {
        document.getElementById('download-modal').style.display = 'none';
    }
</script>
</body>
</html>
