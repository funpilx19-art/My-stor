<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Mod Store</title>
    <style>
        /* আপনার অরিজিনাল UI একদম সেম রাখা হয়েছে, জাস্ট একটু প্রো লুক দেওয়া হয়েছে */
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; margin: 0; padding: 15px; }
        header { 
            text-align: center; 
            padding: 30px 20px; 
            background: linear-gradient(145deg, #1c2128, #161b22); 
            border-radius: 20px; 
            border: 1px solid #30363d; 
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        header h1 { margin: 0; font-size: 24px; color: #238636; text-transform: uppercase; letter-spacing: 1px; }
        
        .app-card { 
            background: #161b22; 
            border-radius: 15px; 
            padding: 12px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            border: 1px solid #30363d; 
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }
        .app-card:hover { transform: translateY(-2px); border-color: #238636; }

        .app-card img { 
            width: 60px; 
            height: 60px; 
            border-radius: 14px; 
            margin-right: 15px; 
            object-fit: cover; 
            border: 1.5px solid #30363d; 
            flex-shrink: 0; 
            background: #0d1117;
        }

        .app-info { flex-grow: 1; overflow: hidden; }
        .app-name { font-size: 16px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-desc { font-size: 12px; color: #8b949e; margin-top: 2px; }

        .download-btn { 
            background: #f85149; 
            color: white; 
            border: none; 
            padding: 10px 0; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 110px; 
            flex-shrink: 0; 
            font-size: 13px; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(248, 81, 73, 0.2);
            transition: all 0.3s;
        }
        .download-mode { background: #238636 !important; box-shadow: 0 4px 15px rgba(35, 134, 54, 0.3) !important; }

        /* পপ-আপ ডিজাইন */
        #download-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px); }
        .modal-content { background: #161b22; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #30363d; width: 85%; max-width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .progress-container { width: 100%; background: #30363d; border-radius: 20px; margin: 20px 0; height: 10px; overflow: hidden; display:none; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #238636, #2ea043); transition: width 0.1s; }
        #unlock-btn { display: none; background: #1f6feb; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <h1>🚀 Premium Mod Store</h1>
</header>

<div id="app-container"></div>

<div id="download-modal">
    <div class="modal-content">
        <h3 id="modal-app-name" style="margin:0 0 10px 0; color:#fff;">Processing...</h3>
        <p id="timer-text" style="color:#8b949e; font-size:14px;">Please wait while we generate the link...</p>
        <div class="progress-container" id="prog-cont">
            <div class="progress-bar" id="prog-bar"></div>
        </div>
        <button id="unlock-btn" onclick="goToLink()">🔥 Start Download</button>
        <button style="margin-top:20px; background:none; border:none; color:#f85149; cursor:pointer; font-weight:bold;" onclick="closeModal()">[ Cancel ]</button>
    </div>
</div>

<script>
    const adsLink = "https://omg10.com/4/10797739"; 

    // প্রতিটি অ্যাপের জন্য কাজ করে এমন Mod ডাউনলোড লিঙ্ক সেট করা হয়েছে
    const apps = [
        { name: "CapCut Pro", desc: "Premium Unlocked", img: "capcut.jpg", link: "https://apkmody.com/apps/capcut/download" },
        { name: "KineMaster", desc: "No Watermark Mod", img: "kinemaster.png", link: "https://apkdone.com/kinemaster/download" },
        { name: "Minecraft", desc: "Full Game Free", img: "minecraft.png", link: "https://apkvision.org/android/games/minecraft-pe-130/download/" },
        { name: "Spotify Premium", desc: "Ad-Free & Unlimited", img: "spotify.png", link: "https://apkmody.com/apps/spotify-music/download" },
        { name: "PicsArt Gold", desc: "All VIP Assets", img: "picsart.png", link: "https://apkdone.com/picsart-photo-studio-1/download" },
        { name: "Lightroom Pro", desc: "Premium Presets", img: "lightroom.png", link: "https://apkmody.com/apps/adobe-lightroom/download" },
        { name: "Canva Pro", desc: "Pro Templates", img: "canva.png", link: "https://apkdone.com/canva/download" },
        { name: "Alight Motion", desc: "Full Unlocked Mod", img: "alight.png", link: "https://apkdone.com/alight-motion/download" },
        { name: "GTA V Mobile", desc: "Full Game Data", img: "gta.jpg", link: "https://apkvision.org/android/games/gta-san-andreas-apk-2/download/" },
        { name: "InShot Pro", desc: "All Filters Unlocked", img: "inshot.png", link: "https://apkdone.com/inshot/download" },
        { name: "Truecaller Gold", desc: "Premium Features", img: "truecaller.jpg", link: "https://modapk.app/truecaller-premium-mod-apk-download/" },
        { name: "Duolingo Plus", desc: "All Courses Free", img: "duolingo.png", link: "https://apkmody.com/apps/duolingo/download" },
        { name: "Remini Pro", desc: "Unlimited AI Photos", img: "remini.png", link: "https://apkdone.com/remini/download" },
        { name: "YouTube Premium", desc: "No Ads & Vanced", img: "youtube.png", link: "https://youtubevanced.com/" },
        { name: "Netflix Mod", desc: "Free Premium Video", img: "netflix.png", link: "https://apkmody.com/apps/netflix/download" }
    ];

    const container = document.getElementById('app-container');
    let targetLink = "";

    apps.forEach((app, index) => {
        container.innerHTML += `
            <div class="app-card">
                <div style="display: flex; align-items: center; overflow: hidden;">
                    <img src="${app.img}" alt="${app.name}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2111/2111432.png'">
                    <div class="app-info">
                        <div class="app-name">${app.name}</div>
                        <div class="app-desc">${app.desc}</div>
                    </div>
                </div>
                <button id="btn-${index}" class="download-btn" onclick="handleAction(${index}, '${app.link}', '${app.name}')">🔓 Unlock</button>
            </div>`;
    });

    function handleAction(index, link, name) {
        const btn = document.getElementById(`btn-${index}`);
        
        if (!btn.classList.contains('download-mode')) {
            window.open(adsLink, '_blank');
            btn.innerText = "📥 Download";
            btn.classList.add('download-mode');
        } else {
            initiateDownload(link, name);
        }
    }

    function initiateDownload(link, name) {
        targetLink = link;
        document.getElementById('modal-app-name').innerText = name;
        document.getElementById('download-modal').style.display = 'flex';
        document.getElementById('prog-cont').style.display = 'block';
        document.getElementById('unlock-btn').style.display = 'none';
        document.getElementById('timer-text').style.display = 'block';
        
        let timeLeft = 5;
        let progress = 0;
        document.getElementById('prog-bar').style.width = "0%";

        let timer = setInterval(() => {
            timeLeft--;
            progress += 20;
            document.getElementById('timer-text').innerText = "Preparing premium link in " + timeLeft + "s...";
            document.getElementById('prog-bar').style.width = progress + "%";

            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('timer-text').style.display = 'none';
                document.getElementById('prog-cont').style.display = 'none';
                document.getElementById('unlock-btn').style.display = 'block';
            }
        }, 1000);
    }

    function goToLink() {
        window.open(targetLink, '_blank');
        closeModal();
    }

    function closeModal() {
        document.getElementById('download-modal').style.display = 'none';
    }
</script>
</body>
</html>
