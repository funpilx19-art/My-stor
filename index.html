<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Apps</title>
    <style>
        /* আপনার অরিজিনাল UI একদম সেম রাখা হয়েছে */
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; margin: 0; padding: 15px; }
        header { text-align: center; padding: 20px; background: #161b22; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        /* অ্যাপ কার্ডের স্টাইল - এখানে একটু পরিবর্তন করা হয়েছে */
        .app-card { 
            background: #161b22; 
            border-radius: 12px; 
            padding: 10px; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            border: 1px solid #30363d; 
            justify-content: space-between; /* লোগো এবং বাটনকে দুই দিকে ঠেলে দেবে */
        }
        
        /* লোগোর স্টাইল - একদম ফিক্সড করা হলো */
        .app-card img { 
            width: 60px !important; /* চওড়া ৬০ পিক্সেল ফিক্সড */
            height: 60px !important; /* উচ্চতা ৬০ পিক্সেল ফিক্সড */
            border-radius: 12px; 
            object-fit: cover; /* ছবি যেন চ্যাপ্টা না হয় */
            border: 1px solid #444; 
            flex-shrink: 0; /* লোগো যেন ছোট না হয়ে যায় */
            margin-right: 15px;
        }
        
        /* অ্যাপ তথ্যের স্টাইল */
        .app-info { 
            flex-grow: 1; 
            margin-right: 10px; 
            overflow: hidden; /* বড় নাম হলে যেন বাইরে না যায় */
        }
        .app-name { 
            font-size: 16px; 
            font-weight: bold; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; /* বড় নাম হলে ডট ডট (...) দেখাবে */
        }
        
        /* বাটনের ডিজাইন - আগের মতোই সমান ফিক্সড */
        .download-btn { 
            background: #238636; 
            color: white; 
            border: none; 
            padding: 10px 0; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 110px; /* বাটনগুলো সমান ১১০ পিক্সেল চওড়া হবে */
            font-size: 13px; 
            text-align: center;
            flex-shrink: 0; /* বাটন যেন ছোট না হয়ে যায় */
            white-space: nowrap; 
        }
        .unlock-mode { background: #f85149 !important; } /* অ্যাড বাটন লাল রঙের হবে */

        /* পপ-আপ ডিজাইন */
        #download-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #30363d; width: 80%; max-width: 350px; }
        .progress-container { width: 100%; background: #30363d; border-radius: 10px; margin: 15px 0; height: 8px; overflow: hidden; display:none; }
        .progress-bar { width: 0%; height: 100%; background: #238636; transition: width 0.1s; }
        #unlock-btn { display: none; background: #1f6feb; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🔥 Top Premium Apps</h1>
</header>

<div id="app-container"></div>

<div id="download-modal">
    <div class="modal-content">
        <h3 id="modal-app-name" style="margin:0 0 10px 0;">Processing...</h3>
        <p id="timer-text" style="color:#8b949e; font-size:14px;">Please wait...</p>
        <div class="progress-container" id="prog-cont">
            <div class="progress-bar" id="prog-bar"></div>
        </div>
        <button id="unlock-btn" onclick="goToPlayStore()">🚀 Download Now</button>
        <button style="margin-top:15px; background:none; border:none; color:#f85149; cursor:pointer;" onclick="closeModal()">[ Cancel ]</button>
    </div>
</div>

<script>
    // আপনার দেওয়া Ads Link এখানে অ্যাড করা হয়েছে
    const adsLink = "https://omg10.com/4/10797739"; 

    const apps = [
        { name: "CapCut Pro", desc: "No Watermark", img: "Image/capcut.jpg", playstore: "https://play.google.com/store/apps/details?id=com.lemon.lvoverseas" },
        { name: "KineMaster", desc: "Pro Unlocked", img: "Image/kinemaster.png", playstore: "https://play.google.com/store/apps/details?id=com.nexstreaming.app.kinemasterfree" },
        { name: "Minecraft", desc: "Full Version", img: "Image/minecraft.png", playstore: "https://play.google.com/store/apps/details?id=com.mojang.minecraftpe" },
        { name: "Spotify Premium", desc: "No Ads", img: "Image/spotify.png", playstore: "https://play.google.com/store/apps/details?id=com.spotify.music" },
        { name: "PicsArt Gold", desc: "VIP Assets", img: "Image/picsart.png", playstore: "https://play.google.com/store/apps/details?id=com.picsart.studio" },
        { name: "Lightroom Pro", desc: "All Presets", img: "Image/lightroom.png", playstore: "https://play.google.com/store/apps/details?id=com.adobe.lrmobile" },
        { name: "Canva Pro", desc: "Pro Templates", img: "Image/canva.png", playstore: "https://play.google.com/store/apps/details?id=com.canva.editor" },
        { name: "Alight Motion", desc: "No Lag Mod", img: "Image/alight.png", playstore: "https://play.google.com/store/apps/details?id=com.alightcreative.motion" },
        { name: "GTA V", desc: "Mobile Edition", img: "Image/gta.jpg", playstore: "https://play.google.com/store/apps/details?id=com.rockstargames.gtasa" },
        { name: "InShot Pro", desc: "Full Effects", img: "Image/inshot.png", playstore: "https://play.google.com/store/apps/details?id=com.camerasideas.instashot" },
        { name: "Truecaller Gold", desc: "Gold Badge", img: "Image/truecaller.jpg", playstore: "https://play.google.com/store/apps/details?id=com.truecaller" },
        { name: "Duolingo Plus", desc: "Premium Courses", img: "Image/duolingo.png", playstore: "https://play.google.com/store/apps/details?id=com.duolingo" },
        { name: "Remini Pro", desc: "Unlimited AI", img: "Image/remini.png", playstore: "https://play.google.com/store/apps/details?id=com.bigwinepot.nwdn.international" },
        { name: "YouTube Premium", desc: "Background Play", img: "Image/youtube.png", playstore: "https://play.google.com/store/apps/details?id=com.google.android.youtube" },
        { name: "Netflix Mod", desc: "Free Movies", img: "Image/netflix.png", playstore: "https://play.google.com/store/apps/details?id=com.netflix.mediaclient" }
    ];

    const container = document.getElementById('app-container');
    let finalPlayStoreLink = "";

    apps.forEach((app, index) => {
        container.innerHTML += `
            <div class="app-card">
                <div style="display: flex; align-items: center; overflow: hidden;">
                    <img src="${app.img}" alt="${app.name}" onerror="this.src='https://via.placeholder.com/60?text=App'">
                    <div class="app-info">
                        <div class="app-name">${app.name}</div>
                        <div style="font-size:11px; color:#8b949e">${app.desc}</div>
                    </div>
                </div>
                <button id="btn-${index}" class="download-btn unlock-mode" onclick="handleAction(${index}, '${app.playstore}', '${app.name}')">🔓 Unlock Ads</button>
            </div>`;
    });

    function handleAction(index, psLink, name) {
        const btn = document.getElementById(`btn-${index}`);
        
        if (btn.classList.contains('unlock-mode')) {
            // স্টেপ ১: অ্যাড ওপেন করা
            window.open(adsLink, '_blank');
            // স্টেপ ২: বাটনের মোড চেঞ্জ করা
            btn.innerText = "📥 Download";
            btn.classList.remove('unlock-mode');
        } else {
            // স্টেপ ৩: টাইমার পপ-আপ দেখানো
            showTimerModal(psLink, name);
        }
    }

    function showTimerModal(link, name) {
        finalPlayStoreLink = link;
        document.getElementById('modal-app-name').innerText = name;
        document.getElementById('download-modal').style.display = 'flex';
        document.getElementById('prog-cont').style.display = 'block';
        document.getElementById('unlock-btn').style.display = 'none';
        document.getElementById('timer-text').style.display = 'block';
        
        let timeLeft = 5;
        let progress = 0;
        document.getElementById('prog-bar').style.width = "0%";

        let timer = setInterval(() => {
            timeLeft--;
            progress += 20;
            document.getElementById('timer-text').innerText = "Redirecting to Play Store in " + timeLeft + "s...";
            document.getElementById('prog-bar').style.width = progress + "%";

            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('timer-text').style.display = 'none';
                document.getElementById('prog-cont').style.display = 'none';
                document.getElementById('unlock-btn').style.display = 'block';
            }
        }, 1000);
    }

    function goToPlayStore() {
        window.location.href = finalPlayStoreLink;
    }

    function closeModal() {
        document.getElementById('download-modal').style.display = 'none';
    }
</script>
</body>
</html>
